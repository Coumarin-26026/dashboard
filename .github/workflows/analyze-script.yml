name: Deep Mach-O Analysis

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Download helper
        uses: actions/download-artifact@v4
        with:
          name: helper-binary
          path: artifacts

      - name: Basic Information
        run: |
          file artifacts/helper > file.txt
          shasum -a 256 artifacts/helper > sha256.txt

      - name: Code Signature
        run: |
          codesign -dv --verbose=4 artifacts/helper \
            > codesign.txt 2>&1 || true

      - name: Gatekeeper
        run: |
          spctl -a -vv artifacts/helper \
            > spctl.txt 2>&1 || true

      - name: Linked Libraries
        run: |
          otool -L artifacts/helper \
            > libraries.txt 2>&1 || true

      - name: Mach-O Headers
        run: |
          otool -hV artifacts/helper \
            > headers.txt 2>&1 || true

      - name: Load Commands
        run: |
          otool -l artifacts/helper \
            > load_commands.txt 2>&1 || true

      - name: Entitlements
        run: |
          codesign -d --entitlements :- artifacts/helper \
            > entitlements.txt 2>&1 || true

      - name: Symbols
        run: |
          nm -nm artifacts/helper \
            > symbols.txt 2>&1 || true

      - name: Dynamic Symbols
        run: |
          nm -gm artifacts/helper \
            > dynamic_symbols.txt 2>&1 || true

      - name: Embedded Strings
        run: |
          strings -a artifacts/helper \
            > strings.txt

      - name: Interesting Strings
        run: |
          grep -iE \
          'https?://|socket|launchctl|plist|agent|daemon|loginitems|keychain|icloud|ssh|curl|wget|bash|zsh|python|osascript|appleevent|endpointsecurity|systemextension|vpn|crypto|wallet|discord|telegram|token|password|chrome|safari|firefox' \
          strings.txt \
          > interesting_strings.txt || true

      - name: Universal Binary Info
        run: |
          lipo -info artifacts/helper \
            > lipo.txt 2>&1 || true

      - name: Architecture Details
        run: |
          otool -arch arm64 -L artifacts/helper \
            > arm64_libs.txt 2>&1 || true

          otool -arch x86_64 -L artifacts/helper \
            > x64_libs.txt 2>&1 || true

      - name: Compress Results
        run: |
          mkdir report
          cp *.txt report/ || true
          zip -r analysis-report.zip report

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: analysis-report.zip
