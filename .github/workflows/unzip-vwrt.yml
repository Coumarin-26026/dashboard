name: Extract VWRT

on:
  workflow_dispatch:
  push:
    paths:
      - "vwrt.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify zip
        run: |
          ls -lh
          file vwrt.zip

      - name: Extract
        run: |
          rm -rf dist
          mkdir dist
          unzip -o vwrt.zip -d dist

      - name: List extracted files
        run: |
          find dist | sort

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dist

          if ! git diff --cached --quiet; then
            git commit -m "Auto extract vwrt.zip"
            git push
          fi
