name: Unzip VWRT

on:
  workflow_dispatch:
  push:
    paths:
      - "vwrt.zip"

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove old dist
        run: rm -rf dist

      - name: Unzip vwrt.zip
        run: |
          mkdir -p dist
          unzip -o vwrt.zip -d dist

      - name: Show result
        run: |
          echo "===== DIST ====="
          find dist | sort

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dist

          git diff --cached --quiet || \
          git commit -m "Auto extract vwrt.zip"

          git push
